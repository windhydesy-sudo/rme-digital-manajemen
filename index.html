<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem RME Mahasiswa Keperawatan Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .ews-normal { background-color: #def7ec; color: #03543f; border-color: #31c48d; }
        .ews-warning { background-color: #fdf6b2; color: #723b13; border-color: #e3a008; }
        .ews-danger { background-color: #fde8e8; color: #9b1c1c; border-color: #f05252; }
        @media print { .no-print { display: none; } }
        .active-tab { border-bottom: 3px solid #1d4ed8; color: #1d4ed8; }
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <!-- Header / Navigasi -->
    <nav class="bg-blue-800 text-white p-4 shadow-md sticky top-0 z-50 no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <h1 class="text-xl font-bold tracking-tight">MediLog <span class="font-light">SmartRME</span></h1>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="resetData()" class="text-xs bg-red-600 hover:bg-red-700 px-3 py-1 rounded transition">Reset Sistem</button>
                <button onclick="window.print()" class="bg-white text-blue-800 hover:bg-blue-50 px-4 py-2 rounded-lg text-sm font-bold transition flex items-center">
                    Cetak
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Sidebar: Info Pasien -->
        <div class="lg:col-span-3 space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="bg-blue-50 p-4 border-b border-gray-100 flex items-center space-x-3">
                    <div class="h-12 w-12 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-lg shadow-sm">BS</div>
                    <div>
                        <h2 class="font-bold text-gray-800">Tn. Budi Santoso</h2>
                        <span class="text-[10px] bg-blue-200 text-blue-800 px-2 py-0.5 rounded-full font-bold uppercase">Umum</span>
                    </div>
                </div>
                <div class="p-4 space-y-3 text-sm">
                    <div class="flex justify-between"><span class="text-gray-500">No. RM</span><span class="font-mono font-bold">12-44-01</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Diagnosis</span><span class="text-right font-medium">CHF NYHA III</span></div>
                    <div class="pt-2 border-t text-[10px] text-gray-400">STATUS AKTIF: <span class="text-green-600 font-bold">DALAM PERAWATAN</span></div>
                </div>
            </div>

            <!-- EWS Status -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
                <h3 class="text-xs font-bold text-gray-400 uppercase mb-3">Skor EWS Terakhir</h3>
                <div id="ews-display" class="ews-normal p-4 rounded-xl text-center border-2 transition-all duration-500">
                    <p class="text-3xl font-black mb-1" id="ews-score">0</p>
                    <p class="text-xs font-bold uppercase tracking-widest" id="ews-label">Stabil</p>
                </div>
                <p id="last-update-time" class="text-[10px] text-gray-400 mt-2 text-center italic">Diperbarui: -</p>
            </div>
        </div>

        <!-- Konten Utama -->
        <div class="lg:col-span-9 space-y-6">
            <div class="flex overflow-x-auto space-x-6 no-print scrollbar-hide border-b border-gray-200 px-2">
                <button onclick="switchTab('cppt')" id="tab-cppt" class="pb-3 text-sm font-bold active-tab whitespace-nowrap">CPPT (SOAP)</button>
                <button onclick="switchTab('vital')" id="tab-vital" class="pb-3 text-sm font-bold text-gray-400 hover:text-blue-600 whitespace-nowrap">Observasi TTV</button>
            </div>

            <!-- CPPT Section -->
            <div id="content-cppt" class="space-y-4">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                    <h3 class="font-bold text-lg mb-6">Catatan Perkembangan Terintegrasi</h3>
                    <div id="cppt-list" class="space-y-6 max-h-[500px] overflow-y-auto pr-2">
                        <!-- Data dari LocalStorage akan muncul di sini -->
                    </div>

                    <div class="mt-8 pt-6 border-t no-print">
                        <textarea id="soap-input" rows="3" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Tulis catatan SOAP (Subjektif, Objektif, Analisis, Planning)..."></textarea>
                        <div class="flex justify-end mt-3">
                            <button onclick="addSOAP()" class="bg-blue-700 hover:bg-blue-800 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg shadow-blue-200">Simpan Ke Rekam Medis</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Vital Signs Section -->
            <div id="content-vital" class="hidden space-y-4">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                    <h3 class="font-bold text-lg mb-6">Grafik & Input Observasi</h3>
                    <div class="h-64 mb-8">
                        <canvas id="ttvChart"></canvas>
                    </div>
                    
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 no-print">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-gray-400">NADI (BPM)</label>
                            <input type="number" id="input-hr" class="w-full border rounded-xl p-3 text-sm bg-gray-50">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-gray-400">NAPAS (x/mnt)</label>
                            <input type="number" id="input-rr" class="w-full border rounded-xl p-3 text-sm bg-gray-50">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-gray-400">SUHU (°C)</label>
                            <input type="number" id="input-temp" step="0.1" class="w-full border rounded-xl p-3 text-sm bg-gray-50">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-gray-400">SpO2 (%)</label>
                            <input type="number" id="input-spo2" class="w-full border rounded-xl p-3 text-sm bg-gray-50">
                        </div>
                    </div>
                    <button onclick="updateTTV()" class="mt-6 w-full bg-blue-700 text-white py-3 rounded-xl font-bold hover:bg-blue-800 shadow-lg">Simpan & Update EWS</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Inisialisasi Data dari LocalStorage atau Data Default
        let rmeData = JSON.parse(localStorage.getItem('rme_data')) || {
            soap: [],
            ttv: {
                labels: ['00:00', '04:00', '08:00'],
                hr: [72, 75, 80],
                temp: [36.5, 36.6, 36.5]
            }
        };

        let ttvChart;

        window.onload = function() {
            renderSOAP();
            initChart();
            calculateEWS();
        };

        function saveToLocal() {
            localStorage.setItem('rme_data', JSON.stringify(rmeData));
        }

        function resetData() {
            if(confirm("Apakah Anda yakin ingin menghapus semua data simulasi?")) {
                localStorage.removeItem('rme_data');
                location.reload();
            }
        }

        function initChart() {
            const ctx = document.getElementById('ttvChart').getContext('2d');
            ttvChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: rmeData.ttv.labels,
                    datasets: [
                        { label: 'Nadi', data: rmeData.ttv.hr, borderColor: '#1d4ed8', tension: 0.4 },
                        { label: 'Suhu', data: rmeData.ttv.temp, borderColor: '#dc2626', yAxisID: 'y1', tension: 0.4 }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: { y1: { position: 'right', grid: { drawOnChartArea: false } } }
                }
            });
        }

        function switchTab(tab) {
            ['cppt', 'vital'].forEach(t => {
                document.getElementById('content-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).classList.remove('active-tab');
            });
            document.getElementById('content-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('active-tab');
        }

        function addSOAP() {
            const input = document.getElementById('soap-input');
            if (!input.value.trim()) return;

            const now = new Date();
            const timeStr = now.toLocaleString('id-ID');
            
            const newEntry = {
                time: timeStr,
                text: input.value,
                user: "Mhs Keperawatan"
            };

            rmeData.soap.unshift(newEntry);
            saveToLocal();
            renderSOAP();
            input.value = "";
        }

        function renderSOAP() {
            const list = document.getElementById('cppt-list');
            list.innerHTML = rmeData.soap.map(item => `
                <div class="relative pl-6 border-l-2 border-green-200 pb-4 animate-fade-in">
                    <div class="absolute -left-[9px] top-0 h-4 w-4 rounded-full bg-green-500 border-2 border-white"></div>
                    <div class="mb-1 text-[10px] text-gray-400 font-bold">${item.time} | ${item.user}</div>
                    <div class="text-sm bg-gray-50 p-3 rounded-xl border border-gray-100">${item.text.replace(/\n/g, '<br>')}</div>
                </div>
            `).join('') || '<p class="text-center text-gray-400 text-sm italic">Belum ada catatan hari ini.</p>';
        }

        function updateTTV() {
            const hr = parseInt(document.getElementById('input-hr').value);
            const temp = parseFloat(document.getElementById('input-temp').value);
            
            if(!hr || !temp) return alert("Mohon isi Nadi dan Suhu!");

            const now = new Date();
            const timeStr = now.getHours() + ":" + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();

            // Update Chart Data
            rmeData.ttv.labels.push(timeStr);
            rmeData.ttv.hr.push(hr);
            rmeData.ttv.temp.push(temp);

            if(rmeData.ttv.labels.length > 10) {
                rmeData.ttv.labels.shift();
                rmeData.ttv.hr.shift();
                rmeData.ttv.temp.shift();
            }

            saveToLocal();
            ttvChart.update();
            calculateEWS();
            
            document.getElementById('last-update-time').innerText = "Diperbarui: " + now.toLocaleString('id-ID');
            alert("Observasi berhasil disimpan di rekam medis.");
        }

        function calculateEWS() {
            const hr = parseInt(document.getElementById('input-hr').value || rmeData.ttv.hr[rmeData.ttv.hr.length-1]);
            const rr = parseInt(document.getElementById('input-rr').value || 20);
            const temp = parseFloat(document.getElementById('input-temp').value || rmeData.ttv.temp[rmeData.ttv.temp.length-1]);
            
            let score = 0;
            if (rr > 24 || rr < 9) score += 3;
            if (hr > 110 || hr < 50) score += 2;
            if (temp > 38.5 || temp < 35.5) score += 1;

            const scoreEl = document.getElementById('ews-score');
            const labelEl = document.getElementById('ews-label');
            const displayEl = document.getElementById('ews-display');

            scoreEl.innerText = score;
            if (score >= 3) {
                labelEl.innerText = "RISIKO TINGGI";
                displayEl.className = "ews-danger p-4 rounded-xl text-center border-2 animate-pulse";
            } else if (score >= 1) {
                labelEl.innerText = "WASPADA";
                displayEl.className = "ews-warning p-4 rounded-xl text-center border-2";
            } else {
                labelEl.innerText = "STABIL";
                displayEl.className = "ews-normal p-4 rounded-xl text-center border-2";
            }
        }
    </script>
</body>
</html>
